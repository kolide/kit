version: "2"
linters:
  enable:
    - bodyclose
    - containedctx
    - exhaustive
    - gocritic
    - misspell
    - nakedret
    - noctx
    - perfsprint
    - predeclared
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - unconvert
    - usetesting
  disable:
    - errcheck
    - gosec
  settings:
    errcheck:
      exclude-functions:
        - github.com/go-kit/kit/log:Log
    gocritic:
      disabled-checks:
        - ifElseChain
        - elseif
    revive:
      rules:
        - name: superfluous-else
          arguments:
            - preserveScope
          severity: warning
          disabled: false
        - name: package-comments
          disabled: false
        - name: context-as-argument
          disabled: false
        - name: context-keys-type
          disabled: false
        - name: error-return
          disabled: false
        - name: errorf
          disabled: false
        - name: unreachable-code
          disabled: false
        - name: early-return
          disabled: false
        - name: confusing-naming
          disabled: false
        - name: defer
          disabled: false
    sloglint:
      kv-only: true
      context: all
      static-msg: true
      key-naming-case: snake
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - paralleltest
        text: does not use range value in test Run
      - linters:
          - perfsprint
        text: fmt.Sprintf can be replaced with string concatenation
      - linters:
          - perfsprint
        text: fmt.Sprintf can be replaced with faster hex.EncodeToString
      - linters:
          - perfsprint
        text: fmt.Sprintf can be replaced with faster strconv.FormatBool
      - linters:
          - perfsprint
        text: fmt.Sprintf can be replaced with faster strconv.FormatInt
      - linters:
          - perfsprint
        text: fmt.Sprintf can be replaced with faster strconv.FormatUint
      - linters:
          - perfsprint
        text: fmt.Sprintf can be replaced with faster strconv.Itoa
      - linters:
          - perfsprint
        text: fmt.Sprint can be replaced with faster strconv.Itoa
    paths:
      - test-cmds
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: false
  exclusions:
    generated: lax
    paths:
      - test-cmds
      - third_party$
      - builtin$
      - examples$
